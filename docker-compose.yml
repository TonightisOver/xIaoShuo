services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xiaoshuo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xiaoshuo2026}
      POSTGRES_DB: xiaoshuo
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 生产环境不暴露 DB 端口到公网（仅容器内网络可见）
    # 如需本地调试，改为 "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaoshuo"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://xiaoshuo:${DB_PASSWORD:-xiaoshuo2026}@db:5432/xiaoshuo
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_MODEL_FLASH: ${DEEPSEEK_MODEL_FLASH:-deepseek-v4-flash}
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # HITL 真 interrupt/resume（需持久化 checkpointer）
      HITL_AUTO_APPROVE: ${HITL_AUTO_APPROVE:-true}
      CHECKPOINTER_TYPE: ${CHECKPOINTER_TYPE:-memory}
      CHECKPOINTER_DB_PATH: ${CHECKPOINTER_DB_PATH:-/app/data/checkpoints.db}
    ports:
      # 仅绑定 127.0.0.1，不暴露到公网（公网通过 nginx:7000 访问）
      # 避免 API 端口直接暴露导致的鉴权绕过（如目录穿越、未鉴权端点）
      - "127.0.0.1:8000:8000"
    volumes:
      # 持久化 LangGraph checkpointer（HITL interrupt 状态跨容器重启保留）
      - ./data:/app/data

  nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "7000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 前端 dist 已打进 nginx 镜像，无需宿主机挂载

volumes:
  pgdata:
